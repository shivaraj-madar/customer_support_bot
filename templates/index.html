<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support Chat</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0f0f13;
    --surface:   #1a1a22;
    --surface2:  #22222e;
    --border:    rgba(255,255,255,0.08);
    --accent:    #6c8cff;
    --accent-bg: rgba(108,140,255,0.12);
    --bot-bg:    #1e1e28;
    --user-bg:   #2a2d5e;
    --text:      #e8e8f0;
    --muted:     #7878a0;
    --green:     #43d9ad;
    --red:       #ff6b6b;
    --radius:    18px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .header-left { display: flex; align-items: center; gap: 12px; }

  .avatar {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: linear-gradient(135deg, #6c8cff, #a78bfa);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .header-info h1 {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  .status {
    display: flex; align-items: center; gap: 5px;
    font-size: 12px; color: var(--muted);
  }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.4; }
  }

  .header-right { display: flex; gap: 8px; }

  .btn-reset {
    padding: 7px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-reset:hover { border-color: var(--accent); color: var(--accent); }

  /* ── USER ID BAR ── */
  .user-bar {
    padding: 8px 24px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .user-bar label {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
  }

  .user-bar select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 4px 10px;
    cursor: pointer;
    outline: none;
  }

  /* ── MESSAGES AREA ── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 24px 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* ── MESSAGES ── */
  .msg-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    animation: fadeUp 0.25s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg-row.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
  }

  .msg-avatar.bot  { background: linear-gradient(135deg, #6c8cff, #a78bfa); }
  .msg-avatar.user { background: linear-gradient(135deg, #43d9ad, #2ab5ac); }

  .bubble {
    max-width: 70%;
    padding: 11px 16px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.6;
    word-break: break-word;
  }

  .bubble.bot {
    background: var(--bot-bg);
    border: 1px solid var(--border);
    border-bottom-left-radius: 5px;
    color: var(--text);
  }

  .bubble.user {
    background: var(--user-bg);
    border: 1px solid rgba(108,140,255,0.2);
    border-bottom-right-radius: 5px;
    color: #c8ccff;
  }

  .bubble.escalate {
    background: rgba(255,107,107,0.1);
    border-color: rgba(255,107,107,0.3);
  }

  .msg-time {
    font-size: 10px;
    color: var(--muted);
    margin-top: 3px;
    padding: 0 4px;
  }

  .msg-col { display: flex; flex-direction: column; }
  .msg-row.user .msg-col { align-items: flex-end; }

  /* ── TYPING INDICATOR ── */
  .typing-row { display: none; }
  .typing-row.show { display: flex; }

  .typing-bubble {
    background: var(--bot-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    border-bottom-left-radius: 5px;
    padding: 12px 18px;
    display: flex;
    gap: 5px;
    align-items: center;
  }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
    animation: bounce 1.2s ease-in-out infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40%           { transform: translateY(-5px); opacity: 1; }
  }

  /* ── QUICK REPLIES ── */
  .quick-replies {
    padding: 0 24px 10px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }

  .qr {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .qr:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }

  /* ── INPUT AREA ── */
  .input-area {
    padding: 14px 24px 20px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 10px 10px 10px 16px;
    transition: border-color 0.2s;
  }

  .input-row:focus-within { border-color: var(--accent); }

  #user-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    line-height: 1.5;
    resize: none;
    max-height: 120px;
    min-height: 22px;
  }

  #user-input::placeholder { color: var(--muted); }

  #send-btn {
    width: 36px; height: 36px;
    border-radius: 10px;
    border: none;
    background: var(--accent);
    color: #fff;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
  }

  #send-btn:hover  { background: #8aa4ff; transform: scale(1.05); }
  #send-btn:active { transform: scale(0.97); }
  #send-btn:disabled { background: var(--surface2); cursor: not-allowed; transform: none; }

  /* send icon */
  #send-btn svg { width: 16px; height: 16px; }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-left">
    <div class="avatar">🤖</div>
    <div class="header-info">
      <h1>Support Assistant</h1>
      <div class="status">
        <div class="status-dot"></div>
        <span>Online — powered by LM Studio</span>
      </div>
    </div>
  </div>
  <div class="header-right">
    <button class="btn-reset" onclick="resetChat()">New chat</button>
  </div>
</header>

<!-- USER BAR -->
<div class="user-bar">
  <label>Logged in as:</label>
  <select id="user-select">
    <option value="USR001">USR001 — Alice Johnson (Pro)</option>
    <option value="USR002">USR002 — Bob Martinez (Basic)</option>
    <option value="">Guest</option>
  </select>
</div>

<!-- MESSAGES -->
<div id="messages">
  <!-- Welcome message -->
  <div class="msg-row bot">
    <div class="msg-avatar bot">🤖</div>
    <div class="msg-col">
      <div class="bubble bot">
        Hi! I'm your support assistant. I can help with refunds, shipping, account issues, billing, and technical problems.<br><br>
        What can I help you with today?
      </div>
      <div class="msg-time">just now</div>
    </div>
  </div>

  <!-- Typing indicator -->
  <div class="msg-row typing-row" id="typing">
    <div class="msg-avatar bot">🤖</div>
    <div class="typing-bubble">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
</div>

<!-- QUICK REPLIES -->
<div class="quick-replies">
  <button class="qr" onclick="sendQuick('How do I get a refund?')">Refund policy</button>
  <button class="qr" onclick="sendQuick('Where is my order?')">Track order</button>
  <button class="qr" onclick="sendQuick('I forgot my password')">Reset password</button>
  <button class="qr" onclick="sendQuick('What plans do you offer?')">View plans</button>
  <button class="qr" onclick="sendQuick('The app is not working')">Technical help</button>
</div>

<!-- INPUT -->
<div class="input-area">
  <div class="input-row">
    <textarea id="user-input" rows="1" placeholder="Type a message..." autocomplete="off"></textarea>
    <button id="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('user-input');
  const sendBtn    = document.getElementById('send-btn');
  const typingEl   = document.getElementById('typing');

  // Auto-resize textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });

  // Send on Enter (Shift+Enter = newline)
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function getTime() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function addMessage(text, role) {
    const isUser     = role === 'user';
    const isEscalate = text.includes('Ticket ID') || text.includes('human agent');

    const row = document.createElement('div');
    row.className = `msg-row ${role}`;

    const avatar = document.createElement('div');
    avatar.className = `msg-avatar ${role}`;
    avatar.textContent = isUser ? '👤' : '🤖';

    const col = document.createElement('div');
    col.className = 'msg-col';

    const bubble = document.createElement('div');
    bubble.className = `bubble ${role}${isEscalate ? ' escalate' : ''}`;
    bubble.innerHTML = text.replace(/\n/g, '<br>');

    const time = document.createElement('div');
    time.className = 'msg-time';
    time.textContent = getTime();

    col.appendChild(bubble);
    col.appendChild(time);

    if (isUser) {
      row.appendChild(col);
      row.appendChild(avatar);
    } else {
      row.appendChild(avatar);
      row.appendChild(col);
    }

    // Insert before typing indicator
    messagesEl.insertBefore(row, typingEl);
    scrollToBottom();
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function showTyping(show) {
    typingEl.classList.toggle('show', show);
    if (show) scrollToBottom();
  }

  async function sendMessage() {
    const text   = inputEl.value.trim();
    const userId = document.getElementById('user-select').value;
    if (!text) return;

    // Add user bubble
    addMessage(text, 'user');
    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;
    showTyping(true);

    try {
      const res  = await fetch('/chat', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ message: text, user_id: userId })
      });
      const data = await res.json();
      showTyping(false);
      addMessage(data.reply || 'Sorry, something went wrong.', 'bot');
    } catch (err) {
      showTyping(false);
      addMessage('Connection error — make sure LM Studio is running.', 'bot');
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }

  function sendQuick(text) {
    inputEl.value = text;
    sendMessage();
  }

  async function resetChat() {
    await fetch('/reset', { method: 'POST' });
    // Clear messages except welcome
    const msgs = messagesEl.querySelectorAll('.msg-row:not(#typing)');
    msgs.forEach(m => m.remove());
    addMessage("Chat reset! How can I help you?", 'bot');
  }
</script>
</body>
</html>
